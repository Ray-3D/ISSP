<html>
  <head>
    <script src="components/aframe171.min.js"></script>
    <script src="components/simple-navmesh-constraint.js"></script>
    <script src="components/aframe-extras.js"></script>

  </head>
  <body>
    <a-scene>
                <a-assets>
    <a-asset-item id="ISSP" src="assets/ISSP001.glb"></a-asset-item>
    <a-asset-item id="grida" src="assets/ISSP-navmesh001.glb"></a-asset-item>
  </a-assets>

        <a-gltf-model src="#ISSP"></a-gltf-model>

        <a-gltf-model id="navmesh" src="#grida" visible="false" position="0 0 0"></a-gltf-model>
        
      <a-sky color="#8ac5ff"></a-sky>

<a-entity
        id="rig"
        movement-controls="speed:0.1"
        position="0 1.7 2"
        rotation="0 -30 0"
      >
        <a-entity
          camera="fov: 80"
           look-controls="pointerLockEnabled: true"
          simple-navmesh-constraint="navmesh:#navmesh"
        ></a-entity>
      </a-entity>


<a-entity light="intensity: 1; type: ambient"></a-entity>


<a-entity id="gaisma1" light="color: #ddd9ca; intensity: 3; type: point" position="0.07265 3.39816 2.57502"></a-entity>
<a-entity id="gaisma2" light="color: #ddd9ca; intensity: 3; type: point" position="5.13196 3.39816 2.57502"></a-entity>
<a-entity id="gaisma3" light="color: #ddd9ca; intensity: 3; type: point" position="10.23378 3.39816 2.57502"></a-entity>
<a-entity id="gaisma4" light="color: #ddd9ca; intensity: 3; type: point" position="15.33203 3.39816 2.57502"></a-entity>

    </a-scene>
  </body>
</html>
